<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Circuito Combinación — Simulador Interactivo</title>
<style>
/* ─── Reset & Base ─── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:          #0a1628;
  --bg-panel:    #0f1f38;
  --bg-card:     #132744;
  --border:      #1e3a5f;
  --text:        #8fa8c8;
  --text-bright: #d0dce8;
  --text-dim:    #4a6580;
  --accent:      #00e89a;
  --accent-dim:  #00a06a;
  --danger:      #ff5566;
  --phase:       #ff4444;
  --neutral:     #4488ff;
  --retour:      #ff9933;
  --shuttle:     #bb77ee;
  --switch-bg:   #152845;
  --switch-bdr:  #2a5a7a;
  --terminal:    #8a9fb4;
  --arm:         #d0dce8;
  --lamp-on:     #ffd54f;
  --lamp-off:    #2a3a4a;
  --cross-int:   #90b8cc;
  --font: "Avenir Next", Avenir, "Gill Sans", "Segoe UI", system-ui, sans-serif;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  padding: 16px;
}

#app {
  max-width: 1020px;
  width: 100%;
}

/* ─── Header ─── */
header {
  text-align: center;
  margin-bottom: 16px;
}
h1 {
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--text-bright);
  letter-spacing: 0.02em;
}
.subtitle {
  font-size: 0.85rem;
  color: var(--text-dim);
  margin-top: 2px;
}

/* ─── Tabs ─── */
.tabs {
  display: flex;
  gap: 8px;
  justify-content: center;
  margin-top: 14px;
}
.tab-btn {
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 20px;
  color: var(--text);
  font-family: var(--font);
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}
.tab-btn small {
  font-size: 0.7rem;
  font-weight: 400;
  color: var(--text-dim);
}
.tab-btn:hover {
  border-color: var(--accent-dim);
  background: var(--bg-card);
}
.tab-btn.active {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--bg-card);
  box-shadow: 0 0 12px rgba(0,232,154,0.1);
}
.tab-btn.active small { color: var(--accent-dim); }

/* ─── SVG Container ─── */
.svg-wrap {
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  margin-top: 12px;
}
#circuit {
  display: block;
  width: 100%;
  height: auto;
}

/* ─── Info Bar (status + controls) ─── */
.info-bar {
  display: flex;
  gap: 12px;
  margin-top: 12px;
  flex-wrap: wrap;
}

/* ─── Status Panel ─── */
#status-panel {
  flex: 1;
  min-width: 260px;
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 18px;
  display: flex;
  flex-wrap: wrap;
  gap: 6px 20px;
}
.st-row {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.82rem;
  min-width: 200px;
}
.st-label { color: var(--text-dim); }
.st-val { font-weight: 600; color: var(--text-bright); }
.st-val.on { color: var(--accent); }
.st-val.off { color: var(--danger); }
.st-divider {
  width: 100%;
  height: 1px;
  background: var(--border);
  margin: 4px 0;
}

/* ─── Controls ─── */
#controls {
  display: flex;
  flex-direction: column;
  gap: 8px;
  justify-content: center;
}
.ctrl-btn {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 18px;
  color: var(--text);
  font-family: var(--font);
  font-size: 0.82rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.ctrl-btn:hover {
  border-color: var(--accent-dim);
  color: var(--text-bright);
}
.ctrl-btn.active-auto {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(0,232,154,0.08);
}

/* ─── Legend ─── */
.legend {
  display: flex;
  gap: 16px;
  justify-content: center;
  flex-wrap: wrap;
  margin-top: 12px;
  font-size: 0.78rem;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  color: var(--text-dim);
}
.swatch {
  width: 24px;
  height: 4px;
  border-radius: 2px;
}
.swatch.phase   { background: var(--phase); }
.swatch.neutral { background: var(--neutral); }
.swatch.retour  { background: var(--retour); }
.swatch.shuttle { background: var(--shuttle); }
.swatch.active  {
  background: linear-gradient(90deg, var(--accent), var(--accent));
  box-shadow: 0 0 6px var(--accent);
}

/* ─── SVG Internal Styles ─── */
.wire {
  fill: none;
  stroke-width: 2.5;
  opacity: 0.15;
  transition: opacity 0.3s, stroke-width 0.3s, stroke 0.3s;
  stroke-linecap: round;
  stroke-linejoin: round;
}
.wire-phase   { stroke: var(--phase); }
.wire-neutral { stroke: var(--neutral); }
.wire-retour  { stroke: var(--retour); }
.wire-shuttle { stroke: var(--shuttle); }
.wire-cross   { stroke: var(--cross-int); stroke-width: 4; opacity: 0.75; }

.wire.active {
  opacity: 1;
  stroke-width: 5;
  filter: drop-shadow(0 0 4px currentColor) drop-shadow(0 0 1px currentColor);
}
.wire-phase.active   { stroke: #ff6666; }
.wire-neutral.active { stroke: #66bbff; }
.wire-retour.active  { stroke: #ffcc55; }
.wire-shuttle.active { stroke: #44ffcc; }
.wire-cross.active {
  stroke: #44ffcc;
  stroke-width: 5;
  opacity: 1;
  filter: drop-shadow(0 0 4px currentColor) drop-shadow(0 0 1px currentColor);
}

/* Flow animation on active wires */
.wire.flowing {
  stroke-dasharray: 14 8;
  animation: flow 0.7s linear infinite;
}
.wire.flowing.flow-reverse {
  animation-direction: reverse;
}
@keyframes flow {
  to { stroke-dashoffset: -20; }
}

/* Switch body */
.switch-body {
  fill: var(--switch-bg);
  stroke: var(--switch-bdr);
  stroke-width: 1.5;
  rx: 6;
}
.switch-body:hover { stroke: var(--accent-dim); }

/* Terminal dots */
.terminal {
  fill: var(--terminal);
  stroke: none;
  transition: fill 0.3s;
}
.terminal.active-term { fill: var(--accent); }

/* Switch arm */
.arm {
  stroke: var(--arm);
  stroke-width: 4;
  stroke-linecap: round;
  transition: stroke 0.3s;
}
.arm.active-arm { stroke: var(--accent); }

/* Click zone */
.click-zone {
  fill: transparent;
  cursor: pointer;
  stroke: none;
}

/* Crossover housing */
.cross-body {
  fill: var(--switch-bg);
  stroke: var(--switch-bdr);
  stroke-width: 1.5;
  rx: 6;
}

/* Lamp */
.lamp-glow {
  fill: url(#lamp-glow-grad);
  opacity: 0;
  transition: opacity 0.4s;
}
.lamp-group.on .lamp-glow { opacity: 0.85; }

.lamp-glass {
  fill: var(--lamp-off);
  stroke: #3a5060;
  stroke-width: 1.5;
  transition: fill 0.3s, stroke 0.3s;
}
.lamp-group.on .lamp-glass {
  fill: #fff8e0;
  stroke: #ffe082;
}

.lamp-base-r {
  fill: #4a5a68;
  stroke: #5a6a78;
  stroke-width: 1;
}

.lamp-filament {
  fill: none;
  stroke: #5a6a78;
  stroke-width: 1.5;
  stroke-linecap: round;
  opacity: 0.3;
  transition: opacity 0.3s, stroke 0.3s;
}
.lamp-group.on .lamp-filament {
  stroke: #ffa000;
  opacity: 1;
  filter: url(#glow-lamp-fil);
}

/* Labels in SVG */
.svg-label {
  fill: var(--text-dim);
  font-size: 11px;
  font-family: var(--font);
  text-anchor: middle;
  pointer-events: none;
}
.svg-label-bold {
  fill: var(--text);
  font-size: 11.5px;
  font-weight: 600;
  font-family: var(--font);
  text-anchor: middle;
  pointer-events: none;
}
.svg-label-sm {
  fill: var(--text-dim);
  font-size: 9.5px;
  font-family: var(--font);
  text-anchor: middle;
  pointer-events: none;
}
.svg-label-color {
  font-size: 10px;
  font-family: var(--font);
  text-anchor: middle;
  pointer-events: none;
}

/* Tooltip */
#tooltip {
  position: fixed;
  display: none;
  background: #1a2d48;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  color: var(--text-bright);
  font-family: var(--font);
  font-size: 0.78rem;
  line-height: 1.5;
  max-width: 280px;
  pointer-events: none;
  z-index: 100;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  white-space: pre-line;
}

/* Responsive */
@media (max-width: 640px) {
  body { padding: 8px; }
  h1 { font-size: 1.15rem; }
  .tabs { flex-direction: column; align-items: center; }
  .info-bar { flex-direction: column; }
  .tab-btn { width: 100%; max-width: 280px; }
}
</style>
</head>
<body>

<div id="app">
  <header>
    <h1>Circuito de iluminación</h1>
    <p class="subtitle">Control desde varios puntos — sin electrónica</p>
    <nav class="tabs">
      <button class="tab-btn active" data-tab="2pt" onclick="switchTab('2pt')">
        Combinación simple
        <small>2 puntos de control</small>
      </button>
      <button class="tab-btn" data-tab="3pt" onclick="switchTab('3pt')">
        Combinación + conmutador
        <small>3 puntos de control</small>
      </button>
      <button class="tab-btn" data-tab="4pt" onclick="switchTab('4pt')">
        Doble conmutador
        <small>4 puntos de control</small>
      </button>
    </nav>
  </header>

  <main>
    <div class="svg-wrap">
      <svg id="circuit" viewBox="0 0 960 540" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <!-- Blueprint grid -->
          <pattern id="grid-pat" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#11253f" stroke-width="0.6"/>
          </pattern>

          <!-- Wire glow filter -->
          <filter id="glow-wire" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="3.5" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>

          <!-- Lamp glow (large warm halo) -->
          <filter id="glow-lamp" x="-100%" y="-100%" width="300%" height="300%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="14" result="b"/>
            <feColorMatrix in="b" type="matrix"
              values="1.2 0 0 0 0.08
                      0 0.95 0 0 0.04
                      0 0 0.5 0 0
                      0 0 0 0.75 0" result="warm"/>
            <feMerge><feMergeNode in="warm"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>

          <!-- Filament glow -->
          <filter id="glow-lamp-fil" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>

          <!-- Lamp glow gradient -->
          <radialGradient id="lamp-glow-grad" cx="50%" cy="45%" r="50%">
            <stop offset="0%" stop-color="#fff8e0" stop-opacity="0.7"/>
            <stop offset="40%" stop-color="#ffd54f" stop-opacity="0.3"/>
            <stop offset="100%" stop-color="#ff8f00" stop-opacity="0"/>
          </radialGradient>
        </defs>

        <!-- Background -->
        <rect width="960" height="540" fill="var(--bg-panel)"/>
        <rect width="960" height="540" fill="url(#grid-pat)" opacity="0.6"/>

        <!-- ════════════════════════════════════════════════════ -->
        <!-- TAB 1: Combinación simple — 2 puntos de control    -->
        <!-- ════════════════════════════════════════════════════ -->
        <g id="tab-2pt">

          <!-- ── Cables ── -->
          <path id="t1-phase" class="wire wire-phase" d="M 80,170 L 158,170"/>
          <path id="t1-shuttle-a" class="wire wire-shuttle" d="M 262,145 L 668,145"/>
          <path id="t1-shuttle-b" class="wire wire-shuttle" d="M 262,195 L 668,195"/>
          <path id="t1-return" class="wire wire-retour" d="M 772,170 L 850,170 L 850,365 L 512,365"/>
          <path id="t1-neutral" class="wire wire-neutral" d="M 490,387 L 490,455 L 80,455"/>

          <!-- ── Fuente fase ── -->
          <circle cx="80" cy="170" r="7" fill="var(--phase)" opacity="0.8"/>
          <text class="svg-label-color" x="80" y="152" fill="var(--phase)">Fase (L)</text>

          <!-- ── Fuente neutro ── -->
          <circle cx="80" cy="455" r="7" fill="var(--neutral)" opacity="0.8"/>
          <text class="svg-label-color" x="80" y="475" fill="var(--neutral)">Neutro (N)</text>

          <!-- ── SW1: interruptor combinado 1 ── -->
          <g id="t1-sw1" transform="translate(210,170)"
             data-tooltip="Interruptor combinado n°1&#10;Conmuta el común (fase) entre los dos puentes.&#10;Hacé clic para cambiar.">
            <rect class="switch-body" x="-52" y="-48" width="104" height="96"/>
            <circle id="t1-sw1-tc" class="terminal" cx="-52" cy="0" r="6"/>
            <circle id="t1-sw1-ta" class="terminal" cx="52" cy="-25" r="6"/>
            <circle id="t1-sw1-tb" class="terminal" cx="52" cy="25" r="6"/>
            <line id="t1-sw1-arm" class="arm" x1="-44" y1="0" x2="44" y2="-25"/>
            <text class="svg-label-sm" x="-38" y="-32">C</text>
            <text class="svg-label-sm" x="38" y="-36">A</text>
            <text class="svg-label-sm" x="38" y="40">B</text>
            <rect class="click-zone" x="-56" y="-52" width="112" height="104"
                  onclick="toggleSwitch('2pt','sw1')"/>
          </g>
          <text class="svg-label-bold" x="210" y="240">Interruptor 1</text>
          <text id="t1-sw1-lbl" class="svg-label-sm" x="210" y="254">Posición A ↑</text>

          <!-- ── SW2: interruptor combinado 2 ── -->
          <g id="t1-sw2" transform="translate(720,170)"
             data-tooltip="Interruptor combinado n°2&#10;Conmuta el retorno de la lámpara entre los dos puentes.&#10;Hacé clic para cambiar.">
            <rect class="switch-body" x="-52" y="-48" width="104" height="96"/>
            <circle id="t1-sw2-ta" class="terminal" cx="-52" cy="-25" r="6"/>
            <circle id="t1-sw2-tb" class="terminal" cx="-52" cy="25" r="6"/>
            <circle id="t1-sw2-tc" class="terminal" cx="52" cy="0" r="6"/>
            <line id="t1-sw2-arm" class="arm" x1="44" y1="0" x2="-44" y2="-25"/>
            <text class="svg-label-sm" x="-38" y="-36">A</text>
            <text class="svg-label-sm" x="-38" y="40">B</text>
            <text class="svg-label-sm" x="38" y="-32">C</text>
            <rect class="click-zone" x="-56" y="-52" width="112" height="104"
                  onclick="toggleSwitch('2pt','sw2')"/>
          </g>
          <text class="svg-label-bold" x="720" y="240">Interruptor 2</text>
          <text id="t1-sw2-lbl" class="svg-label-sm" x="720" y="254">Posición A ↑</text>

          <!-- ── Etiquetas puentes ── -->
          <text class="svg-label" x="465" y="138"
                data-tooltip="Puente A&#10;Uno de los dos cables que conectan los interruptores.&#10;La corriente pasa cuando ambos interruptores están en posición A.">Puente A</text>
          <text class="svg-label" x="465" y="212"
                data-tooltip="Puente B&#10;Uno de los dos cables que conectan los interruptores.&#10;La corriente pasa cuando ambos interruptores están en posición B.">Puente B</text>

          <!-- ── Etiqueta retorno ── -->
          <text class="svg-label-color" x="870" y="272" fill="var(--retour)" transform="rotate(90,870,272)"
                data-tooltip="Retorno lámpara&#10;Este cable lleva la corriente desde el interruptor 2 hasta la lámpara.">Retorno</text>

          <!-- ── Lámpara ── -->
          <g id="t1-lamp" class="lamp-group on" transform="translate(490,365)"
             data-tooltip="Lámpara&#10;Se enciende cuando el circuito está cerrado:&#10;un camino continuo conecta la fase con el neutro.">
            <circle class="lamp-glow" r="45" filter="url(#glow-lamp)"/>
            <circle class="lamp-glass" r="22"/>
            <path class="lamp-filament" d="M -8,-4 Q -4,-14 0,-2 Q 4,-14 8,-4"/>
            <rect class="lamp-base-r" x="-10" y="17" width="20" height="6" rx="2"/>
          </g>
          <text class="svg-label-bold" x="490" y="410">Lámpara</text>

        </g><!-- /tab-2pt -->

        <!-- ════════════════════════════════════════════════════ -->
        <!-- TAB 2: Combinación + conmutador — 3 puntos         -->
        <!-- ════════════════════════════════════════════════════ -->
        <g id="tab-3pt" display="none">

          <!-- ── Cables ── -->
          <path id="t2-phase" class="wire wire-phase" d="M 50,170 L 98,170"/>
          <path id="t2-shuttle-al" class="wire wire-shuttle" d="M 202,145 L 363,145"/>
          <path id="t2-shuttle-bl" class="wire wire-shuttle" d="M 202,195 L 363,195"/>
          <path id="t2-shuttle-ar" class="wire wire-shuttle" d="M 497,145 L 668,145"/>
          <path id="t2-shuttle-br" class="wire wire-shuttle" d="M 497,195 L 668,195"/>
          <path id="t2-return" class="wire wire-retour" d="M 772,170 L 850,170 L 850,365 L 512,365"/>
          <path id="t2-neutral" class="wire wire-neutral" d="M 490,387 L 490,455 L 50,455"/>

          <!-- ── Fuente fase ── -->
          <circle cx="50" cy="170" r="7" fill="var(--phase)" opacity="0.8"/>
          <text class="svg-label-color" x="50" y="152" fill="var(--phase)">Fase (L)</text>

          <!-- ── Fuente neutro ── -->
          <circle cx="50" cy="455" r="7" fill="var(--neutral)" opacity="0.8"/>
          <text class="svg-label-color" x="50" y="475" fill="var(--neutral)">Neutro (N)</text>

          <!-- ── SW1 ── -->
          <g id="t2-sw1" transform="translate(150,170)"
             data-tooltip="Interruptor combinado n°1&#10;Primer punto de control.&#10;Conmuta la fase entre los dos puentes.&#10;Hacé clic para cambiar.">
            <rect class="switch-body" x="-52" y="-48" width="104" height="96"/>
            <circle id="t2-sw1-tc" class="terminal" cx="-52" cy="0" r="6"/>
            <circle id="t2-sw1-ta" class="terminal" cx="52" cy="-25" r="6"/>
            <circle id="t2-sw1-tb" class="terminal" cx="52" cy="25" r="6"/>
            <line id="t2-sw1-arm" class="arm" x1="-44" y1="0" x2="44" y2="-25"/>
            <text class="svg-label-sm" x="-38" y="-32">C</text>
            <text class="svg-label-sm" x="38" y="-36">A</text>
            <text class="svg-label-sm" x="38" y="40">B</text>
            <rect class="click-zone" x="-56" y="-52" width="112" height="104"
                  onclick="toggleSwitch('3pt','sw1')"/>
          </g>
          <text class="svg-label-bold" x="150" y="240">Interruptor 1</text>
          <text id="t2-sw1-lbl" class="svg-label-sm" x="150" y="254">Posición A ↑</text>

          <!-- ── Conmutador de cruce ── -->
          <g id="t2-crossover" transform="translate(430,170)"
             data-tooltip="Conmutador de cruce&#10;4 bornes: cruza o deja pasar directo los puentes.&#10;En conexión directa: A→A y B→B&#10;En conexión cruzada: A→B y B→A&#10;Hacé clic para cambiar.">
            <rect class="cross-body" x="-67" y="-52" width="134" height="104"/>
            <circle id="t2-cr-it" class="terminal" cx="-67" cy="-25" r="6"/>
            <circle id="t2-cr-ib" class="terminal" cx="-67" cy="25" r="6"/>
            <circle id="t2-cr-ot" class="terminal" cx="67" cy="-25" r="6"/>
            <circle id="t2-cr-ob" class="terminal" cx="67" cy="25" r="6"/>
            <path id="t2-cross-1" class="wire wire-cross"
                  d="M -67,-25 C -20,-14 20,-14 67,-25"/>
            <path id="t2-cross-2" class="wire wire-cross"
                  d="M -67,25 C -20,14 20,14 67,25"/>
            <text class="svg-label-sm" x="-55" y="-34">1</text>
            <text class="svg-label-sm" x="-55" y="38">2</text>
            <text class="svg-label-sm" x="55" y="-34">3</text>
            <text class="svg-label-sm" x="55" y="38">4</text>
            <rect class="click-zone" x="-70" y="-55" width="140" height="110"
                  onclick="toggleSwitch('3pt','cross')"/>
          </g>
          <text class="svg-label-bold" x="430" y="245">Conmutador</text>
          <text id="t2-cross-lbl" class="svg-label-sm" x="430" y="259">Conexión directa ═══</text>

          <!-- ── SW2 ── -->
          <g id="t2-sw2" transform="translate(720,170)"
             data-tooltip="Interruptor combinado n°2&#10;Último punto de control.&#10;Conmuta el retorno de la lámpara entre los dos puentes.&#10;Hacé clic para cambiar.">
            <rect class="switch-body" x="-52" y="-48" width="104" height="96"/>
            <circle id="t2-sw2-ta" class="terminal" cx="-52" cy="-25" r="6"/>

<script>
/* ═══════════════════════════════════════════════════════════
   Circuito Combinación — Simulador Interactivo
   JS puro, sin dependencias
   ═══════════════════════════════════════════════════════════ */

// ─── Estado ───
const state = {
  tab: '2pt',
  autoplay: false,
  autoTimer: null,
  autoIndex: 0,
  switches: {
    '2pt': { sw1: 0, sw2: 0 },
    '3pt': { sw1: 0, cross: 0, sw2: 0 },
    '4pt': { sw1: 0, cross1: 0, cross2: 0, sw2: 0 }
  }
};

// ─── Prefijo por pestaña ───
function tabPrefix(tabId) {
  return tabId === '2pt' ? 't1' : tabId === '3pt' ? 't2' : 't3';
}

// ─── Lógica del circuito ───
function getActivePath(tabId) {
  const s = state.switches[tabId];

  if (tabId === '2pt') {
    const closed = s.sw1 === s.sw2;
    if (!closed) return { closed: false, segments: [] };
    const shuttle = s.sw1 === 0 ? 't1-shuttle-a' : 't1-shuttle-b';
    return { closed: true, segments: ['t1-phase', shuttle, 't1-return', 't1-neutral'] };
  }

  if (tabId === '3pt') {
    const enterTop = s.sw1 === 0;
    const exitTop = s.cross === 0 ? enterTop : !enterTop;
    const sw2Top = s.sw2 === 0;
    const closed = exitTop === sw2Top;
    if (!closed) return { closed: false, segments: [] };

    const leftShuttle  = enterTop ? 't2-shuttle-al' : 't2-shuttle-bl';
    const crossPath    = enterTop ? 't2-cross-1' : 't2-cross-2';
    const rightShuttle = exitTop  ? 't2-shuttle-ar' : 't2-shuttle-br';
    return {
      closed: true,
      segments: ['t2-phase', leftShuttle, crossPath, rightShuttle, 't2-return', 't2-neutral']
    };
  }

  // 4pt
  const enterTop    = s.sw1 === 0;
  const afterCross1 = s.cross1 === 0 ? enterTop : !enterTop;
  const afterCross2 = s.cross2 === 0 ? afterCross1 : !afterCross1;
  const sw2Top      = s.sw2 === 0;
  const closed      = afterCross2 === sw2Top;
  if (!closed) return { closed: false, segments: [] };

  const leftShuttle  = enterTop    ? 't3-shuttle-al' : 't3-shuttle-bl';
  const cross1Path   = enterTop    ? 't3-cross1-1'   : 't3-cross1-2';
  const midShuttle   = afterCross1 ? 't3-shuttle-am' : 't3-shuttle-bm';
  const cross2Path   = afterCross1 ? 't3-cross2-1'   : 't3-cross2-2';
  const rightShuttle = afterCross2 ? 't3-shuttle-ar' : 't3-shuttle-br';
  return {
    closed: true,
    segments: ['t3-phase', leftShuttle, cross1Path, midShuttle, cross2Path, rightShuttle, 't3-return', 't3-neutral']
  };
}

// ─── Actualizar visuales ───
function updateCircuit(tabId) {
  const result = getActivePath(tabId);
  const tabEl = document.getElementById('tab-' + tabId);

  tabEl.querySelectorAll('.wire').forEach(w => {
    const isActive = result.closed && result.segments.includes(w.id);
    w.classList.toggle('active', isActive);
    w.classList.toggle('flowing', isActive);
  });

  const prefix = tabPrefix(tabId);
  const lamp = document.getElementById(prefix + '-lamp');
  lamp.classList.toggle('on', result.closed);
  lamp.classList.toggle('off', !result.closed);

  updateTerminals(tabId, result);
  updateStatus(tabId, result.closed);
  updateSvgLabels(tabId);
}

// Resaltar terminales y brazos activos
function updateTerminals(tabId, result) {
  const prefix = tabPrefix(tabId);
  const s = state.switches[tabId];

  ['sw1', 'sw2'].forEach(sw => {
    const armEl = document.getElementById(`${prefix}-${sw}-arm`);
    const tcEl = document.getElementById(`${prefix}-${sw}-tc`);
    const taEl = document.getElementById(`${prefix}-${sw}-ta`);
    const tbEl = document.getElementById(`${prefix}-${sw}-tb`);
    const isA = s[sw] === 0;
    armEl.classList.toggle('active-arm', result.closed);
    tcEl.classList.toggle('active-term', result.closed);
    taEl.classList.toggle('active-term', result.closed && isA);
    tbEl.classList.toggle('active-term', result.closed && !isA);
  });

  if (tabId === '3pt') {
    const enterTop = s.sw1 === 0;
    const exitTop = s.cross === 0 ? enterTop : !enterTop;
    ['it', 'ib', 'ot', 'ob'].forEach(t => {
      const el = document.getElementById('t2-cr-' + t);
      let active = false;
      if (result.closed) {
        if (t === 'it') active = enterTop;
        if (t === 'ib') active = !enterTop;
        if (t === 'ot') active = exitTop;
        if (t === 'ob') active = !exitTop;
      }
      el.classList.toggle('active-term', active);
    });
  }

  if (tabId === '4pt') {
    const enterTop    = s.sw1 === 0;
    const afterCross1 = s.cross1 === 0 ? enterTop : !enterTop;
    const afterCross2 = s.cross2 === 0 ? afterCross1 : !afterCross1;

    ['it', 'ib', 'ot', 'ob'].forEach(t => {
      const el = document.getElementById('t3-cr1-' + t);
      let active = false;
      if (result.closed) {
        if (t === 'it') active = enterTop;
        if (t === 'ib') active = !enterTop;
        if (t === 'ot') active = afterCross1;
        if (t === 'ob') active = !afterCross1;
      }
      el.classList.toggle('active-term', active);
    });

    ['it', 'ib', 'ot', 'ob'].forEach(t => {
      const el = document.getElementById('t3-cr2-' + t);
      let active = false;
      if (result.closed) {
        if (t === 'it') active = afterCross1;
        if (t === 'ib') active = !afterCross1;
        if (t === 'ot') active = afterCross2;
        if (t === 'ob') active = !afterCross2;
      }
      el.classList.toggle('active-term', active);
    });
  }
}

// ─── Conmutación + animación ───
function toggleSwitch(tabId, key) {
  const s = state.switches[tabId];
  if (key === 'cross') {
    s.cross = 1 - s.cross;
    animateCrossover('t2-cross-1', 't2-cross-2', s.cross);
  } else if (key === 'cross1' || key === 'cross2') {
    s[key] = 1 - s[key];
    const n = key === 'cross1' ? '1' : '2';
    animateCrossover(`t3-cross${n}-1`, `t3-cross${n}-2`, s[key]);
  } else {
    s[key] = 1 - s[key];
    animateArm(tabId, key, s[key]);
  }
  updateCircuit(tabId);
}

function animateArm(tabId, key, newPos) {
  const prefix = tabPrefix(tabId);
  const arm = document.getElementById(`${prefix}-${key}-arm`);
  const startY = parseFloat(arm.getAttribute('y2'));
  const endY = newPos === 0 ? -25 : 25;
  if (startY === endY) return;

  const t0 = performance.now();
  const dur = 220;
  (function tick(now) {
    const t = Math.min((now - t0) / dur, 1);
    const e = easeInOutQuad(t);
    arm.setAttribute('y2', lerp(startY, endY, e).toFixed(1));
    if (t < 1) requestAnimationFrame(tick);
  })(t0);
}

function animateCrossover(p1Id, p2Id, newState) {
  const p1 = document.getElementById(p1Id);
  const p2 = document.getElementById(p2Id);

  const cur1 = parseCrossD(p1.getAttribute('d'));
  const cur2 = parseCrossD(p2.getAttribute('d'));

  const tgt1 = newState === 0 ? { cp: -14, end: -25 } : { cp: 25, end: 25 };
  const tgt2 = newState === 0 ? { cp: 14, end: 25 }   : { cp: -25, end: -25 };

  const t0 = performance.now();
  const dur = 280;
  (function tick(now) {
    const t = Math.min((now - t0) / dur, 1);
    const e = easeInOutQuad(t);

    const cp1 = lerp(cur1.cp, tgt1.cp, e).toFixed(1);
    const ey1 = lerp(cur1.end, tgt1.end, e).toFixed(1);
    p1.setAttribute('d', `M -67,-25 C -20,-25 20,${cp1} 67,${ey1}`);

    const cp2 = lerp(cur2.cp, tgt2.cp, e).toFixed(1);
    const ey2 = lerp(cur2.end, tgt2.end, e).toFixed(1);
    p2.setAttribute('d', `M -67,25 C -20,25 20,${cp2} 67,${ey2}`);

    if (t < 1) requestAnimationFrame(tick);
  })(t0);
}

function parseCrossD(d) {
  const nums = d.match(/-?\d+\.?\d*/g);
  return { cp: parseFloat(nums[5]), end: parseFloat(nums[7]) };
}

// ─── Cambio de pestaña ───
function switchTab(tabId) {
  if (state.tab === tabId) return;
  stopAutoplay();
  state.tab = tabId;

  ['2pt', '3pt', '4pt'].forEach(t => {
    document.getElementById('tab-' + t).setAttribute('display', t === tabId ? '' : 'none');
  });

  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === tabId);
  });

  const cross1Row = document.getElementById('st-cross1-row');
  const cross2Row = document.getElementById('st-cross2-row');
  const cross1Label = document.getElementById('st-cross1-label');

  if (tabId === '2pt') {
    cross1Row.style.display = 'none';
    cross2Row.style.display = 'none';
  } else if (tabId === '3pt') {
    cross1Row.style.display = '';
    cross2Row.style.display = 'none';
    cross1Label.textContent = 'Conmutador:';
  } else {
    cross1Row.style.display = '';
    cross2Row.style.display = '';
    cross1Label.textContent = 'Conmutador 1:';
  }

  updateCircuit(tabId);
}

// ─── Panel de estado ───
function updateStatus(tabId, closed) {
  const s = state.switches[tabId];
  const posLabel = v => v === 0 ? 'Posición A ↑' : 'Posición B ↓';
  const crossLabel = v => v === 0 ? 'Conexión directa' : 'Conexión cruzada';

  document.getElementById('st-sw1').textContent = posLabel(s.sw1);
  document.getElementById('st-sw2').textContent = posLabel(s.sw2);

  if (tabId === '3pt') {
    document.getElementById('st-cross1').textContent = crossLabel(s.cross);
  } else if (tabId === '4pt') {
    document.getElementById('st-cross1').textContent = crossLabel(s.cross1);
    document.getElementById('st-cross2').textContent = crossLabel(s.cross2);
  }

  const stCircuit = document.getElementById('st-circuit');
  stCircuit.textContent = closed ? 'Cerrado' : 'Abierto';
  stCircuit.className = 'st-val ' + (closed ? 'on' : 'off');

  const stLamp = document.getElementById('st-lamp');
  stLamp.textContent = closed ? 'Encendida' : 'Apagada';
  stLamp.className = 'st-val ' + (closed ? 'on' : 'off');
}

// ─── Etiquetas SVG ───
function updateSvgLabels(tabId) {
  const s = state.switches[tabId];
  const prefix = tabPrefix(tabId);
  const posLabel = v => v === 0 ? 'Posición A ↑' : 'Posición B ↓';

  const sw1Lbl = document.getElementById(`${prefix}-sw1-lbl`);
  if (sw1Lbl) sw1Lbl.textContent = posLabel(s.sw1);
  const sw2Lbl = document.getElementById(`${prefix}-sw2-lbl`);
  if (sw2Lbl) sw2Lbl.textContent = posLabel(s.sw2);

  if (tabId === '3pt') {
    const crossLbl = document.getElementById('t2-cross-lbl');
    if (crossLbl) crossLbl.textContent = s.cross === 0 ? 'Conexión directa ═══' : 'Conexión cruzada ╳';
  } else if (tabId === '4pt') {
    const c1Lbl = document.getElementById('t3-cross1-lbl');
    if (c1Lbl) c1Lbl.textContent = s.cross1 === 0 ? 'Conexión directa ═══' : 'Conexión cruzada ╳';
    const c2Lbl = document.getElementById('t3-cross2-lbl');
    if (c2Lbl) c2Lbl.textContent = s.cross2 === 0 ? 'Conexión directa ═══' : 'Conexión cruzada ╳';
  }
}

// ─── Reproducción automática ───
const AUTOPLAY_SEQ = {
  '2pt': [
    { sw1: 0, sw2: 0 },
    { sw1: 1, sw2: 0 },
    { sw1: 1, sw2: 1 },
    { sw1: 0, sw2: 1 },
  ],
  '3pt': [
    { sw1: 0, cross: 0, sw2: 0 },
    { sw1: 1, cross: 0, sw2: 0 },
    { sw1: 1, cross: 1, sw2: 0 },
    { sw1: 1, cross: 1, sw2: 1 },
    { sw1: 0, cross: 1, sw2: 1 },
    { sw1: 0, cross: 0, sw2: 1 },
  ],
  '4pt': [
    { sw1: 0, cross1: 0, cross2: 0, sw2: 0 },
    { sw1: 1, cross1: 0, cross2: 0, sw2: 0 },
    { sw1: 1, cross1: 1, cross2: 0, sw2: 0 },
    { sw1: 1, cross1: 1, cross2: 1, sw2: 0 },
    { sw1: 1, cross1: 1, cross2: 1, sw2: 1 },
    { sw1: 0, cross1: 1, cross2: 1, sw2: 1 },
    { sw1: 0, cross1: 0, cross2: 1, sw2: 1 },
    { sw1: 0, cross1: 0, cross2: 0, sw2: 1 },
  ]
};

function toggleAutoplay() {
  state.autoplay ? stopAutoplay() : startAutoplay();
}

function startAutoplay() {
  state.autoplay = true;
  state.autoIndex = -1;
  document.getElementById('btn-auto').classList.add('active-auto');
  document.getElementById('btn-auto').textContent = 'Detener';
  autoplayStep();
  state.autoTimer = setInterval(autoplayStep, 1600);
}

function stopAutoplay() {
  state.autoplay = false;
  clearInterval(state.autoTimer);
  state.autoTimer = null;
  document.getElementById('btn-auto').classList.remove('active-auto');
  document.getElementById('btn-auto').textContent = 'Reproducción automática';
}

function autoplayStep() {
  const tabId = state.tab;
  const seq = AUTOPLAY_SEQ[tabId];
  state.autoIndex = (state.autoIndex + 1) % seq.length;
  const target = seq[state.autoIndex];
  const current = state.switches[tabId];

  for (const key of Object.keys(target)) {
    if (current[key] !== target[key]) {
      toggleSwitch(tabId, key);
      break;
    }
  }
}

// ─── Reiniciar ───
function resetCircuit() {
  stopAutoplay();
  const tabId = state.tab;
  const s = state.switches[tabId];
  Object.keys(s).forEach(key => {
    if (s[key] !== 0) toggleSwitch(tabId, key);
  });
}

// ─── Tooltips ───
const tooltipEl = document.getElementById('tooltip');

document.getElementById('circuit').addEventListener('mousemove', e => {
  const target = e.target.closest('[data-tooltip]');
  if (!target) { tooltipEl.style.display = 'none'; return; }
  tooltipEl.textContent = target.getAttribute('data-tooltip');
  tooltipEl.style.display = 'block';

  const pad = 14;
  let x = e.clientX + pad;
  let y = e.clientY + pad;
  const r = tooltipEl.getBoundingClientRect();
  if (x + r.width > window.innerWidth - 8) x = e.clientX - r.width - pad;
  if (y + r.height > window.innerHeight - 8) y = e.clientY - r.height - pad;
  tooltipEl.style.left = x + 'px';
  tooltipEl.style.top = y + 'px';
});

document.getElementById('circuit').addEventListener('mouseleave', () => {
  tooltipEl.style.display = 'none';
});

// ─── Utilidades ───
function lerp(a, b, t) { return a + (b - a) * t; }
function easeInOutQuad(t) { return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t; }

// ─── Inicialización ───
updateCircuit('2pt');
</script>
