<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Circuit Va-et-Vient — Simulateur Interactif</title>
<style>
/* ─── Reset & Base ─── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:          #0a1628;
  --bg-panel:    #0f1f38;
  --bg-card:     #132744;
  --border:      #1e3a5f;
  --text:        #8fa8c8;
  --text-bright: #d0dce8;
  --text-dim:    #4a6580;
  --accent:      #00e89a;
  --accent-dim:  #00a06a;
  --danger:      #ff5566;
  --phase:       #ff4444;
  --neutral:     #4488ff;
  --retour:      #ff9933;
  --shuttle:     #bb77ee;
  --switch-bg:   #152845;
  --switch-bdr:  #2a5a7a;
  --terminal:    #8a9fb4;
  --arm:         #d0dce8;
  --lamp-on:     #ffd54f;
  --lamp-off:    #2a3a4a;
  --cross-int:   #90b8cc;
  --font: "Avenir Next", Avenir, "Gill Sans", "Segoe UI", system-ui, sans-serif;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  padding: 16px;
}

#app {
  max-width: 1020px;
  width: 100%;
}

/* ─── Header ─── */
header {
  text-align: center;
  margin-bottom: 16px;
}
h1 {
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--text-bright);
  letter-spacing: 0.02em;
}
.subtitle {
  font-size: 0.85rem;
  color: var(--text-dim);
  margin-top: 2px;
}

/* ─── Tabs ─── */
.tabs {
  display: flex;
  gap: 8px;
  justify-content: center;
  margin-top: 14px;
}
.tab-btn {
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 20px;
  color: var(--text);
  font-family: var(--font);
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}
.tab-btn small {
  font-size: 0.7rem;
  font-weight: 400;
  color: var(--text-dim);
}
.tab-btn:hover {
  border-color: var(--accent-dim);
  background: var(--bg-card);
}
.tab-btn.active {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--bg-card);
  box-shadow: 0 0 12px rgba(0,232,154,0.1);
}
.tab-btn.active small { color: var(--accent-dim); }

/* ─── SVG Container ─── */
.svg-wrap {
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  margin-top: 12px;
}
#circuit {
  display: block;
  width: 100%;
  height: auto;
}

/* ─── Info Bar (status + controls) ─── */
.info-bar {
  display: flex;
  gap: 12px;
  margin-top: 12px;
  flex-wrap: wrap;
}

/* ─── Status Panel ─── */
#status-panel {
  flex: 1;
  min-width: 260px;
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 18px;
  display: flex;
  flex-wrap: wrap;
  gap: 6px 20px;
}
.st-row {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.82rem;
  min-width: 200px;
}
.st-label { color: var(--text-dim); }
.st-val { font-weight: 600; color: var(--text-bright); }
.st-val.on { color: var(--accent); }
.st-val.off { color: var(--danger); }
.st-divider {
  width: 100%;
  height: 1px;
  background: var(--border);
  margin: 4px 0;
}

/* ─── Controls ─── */
#controls {
  display: flex;
  flex-direction: column;
  gap: 8px;
  justify-content: center;
}
.ctrl-btn {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 18px;
  color: var(--text);
  font-family: var(--font);
  font-size: 0.82rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.ctrl-btn:hover {
  border-color: var(--accent-dim);
  color: var(--text-bright);
}
.ctrl-btn.active-auto {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(0,232,154,0.08);
}

/* ─── Legend ─── */
.legend {
  display: flex;
  gap: 16px;
  justify-content: center;
  flex-wrap: wrap;
  margin-top: 12px;
  font-size: 0.78rem;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  color: var(--text-dim);
}
.swatch {
  width: 24px;
  height: 4px;
  border-radius: 2px;
}
.swatch.phase   { background: var(--phase); }
.swatch.neutral { background: var(--neutral); }
.swatch.retour  { background: var(--retour); }
.swatch.shuttle { background: var(--shuttle); }
.swatch.active  {
  background: linear-gradient(90deg, var(--accent), var(--accent));
  box-shadow: 0 0 6px var(--accent);
}

/* ─── SVG Internal Styles ─── */
.wire {
  fill: none;
  stroke-width: 2.5;
  opacity: 0.15;
  transition: opacity 0.3s, stroke-width 0.3s, stroke 0.3s;
  stroke-linecap: round;
  stroke-linejoin: round;
}
.wire-phase   { stroke: var(--phase); }
.wire-neutral { stroke: var(--neutral); }
.wire-retour  { stroke: var(--retour); }
.wire-shuttle { stroke: var(--shuttle); }
.wire-cross   { stroke: var(--cross-int); stroke-width: 4; opacity: 0.75; }

.wire.active {
  opacity: 1;
  stroke-width: 5;
  /* CSS drop-shadow instead of SVG filter — avoids 0-height bounding box bug */
  filter: drop-shadow(0 0 4px currentColor) drop-shadow(0 0 1px currentColor);
}
/* Brighter colors for active wires — high contrast on dark bg */
.wire-phase.active   { stroke: #ff6666; }
.wire-neutral.active { stroke: #66bbff; }
.wire-retour.active  { stroke: #ffcc55; }
.wire-shuttle.active { stroke: #44ffcc; }
.wire-cross.active {
  stroke: #44ffcc;
  stroke-width: 5;
  opacity: 1;
  filter: drop-shadow(0 0 4px currentColor) drop-shadow(0 0 1px currentColor);
}

/* Flow animation on active wires */
.wire.flowing {
  stroke-dasharray: 14 8;
  animation: flow 0.7s linear infinite;
}
.wire.flowing.flow-reverse {
  animation-direction: reverse;
}
@keyframes flow {
  to { stroke-dashoffset: -20; }
}

/* Switch body */
.switch-body {
  fill: var(--switch-bg);
  stroke: var(--switch-bdr);
  stroke-width: 1.5;
  rx: 6;
}
.switch-body:hover { stroke: var(--accent-dim); }

/* Terminal dots */
.terminal {
  fill: var(--terminal);
  stroke: none;
  transition: fill 0.3s;
}
.terminal.active-term { fill: var(--accent); }

/* Switch arm */
.arm {
  stroke: var(--arm);
  stroke-width: 4;
  stroke-linecap: round;
  transition: stroke 0.3s;
}
.arm.active-arm { stroke: var(--accent); }

/* Click zone */
.click-zone {
  fill: transparent;
  cursor: pointer;
  stroke: none;
}

/* Crossover housing */
.cross-body {
  fill: var(--switch-bg);
  stroke: var(--switch-bdr);
  stroke-width: 1.5;
  rx: 6;
}

/* Lamp */
.lamp-glow {
  fill: url(#lamp-glow-grad);
  opacity: 0;
  transition: opacity 0.4s;
}
.lamp-group.on .lamp-glow { opacity: 0.85; }

.lamp-glass {
  fill: var(--lamp-off);
  stroke: #3a5060;
  stroke-width: 1.5;
  transition: fill 0.3s, stroke 0.3s;
}
.lamp-group.on .lamp-glass {
  fill: #fff8e0;
  stroke: #ffe082;
}

.lamp-base-r {
  fill: #4a5a68;
  stroke: #5a6a78;
  stroke-width: 1;
}

.lamp-filament {
  fill: none;
  stroke: #5a6a78;
  stroke-width: 1.5;
  stroke-linecap: round;
  opacity: 0.3;
  transition: opacity 0.3s, stroke 0.3s;
}
.lamp-group.on .lamp-filament {
  stroke: #ffa000;
  opacity: 1;
  filter: url(#glow-lamp-fil);
}

/* Labels in SVG */
.svg-label {
  fill: var(--text-dim);
  font-size: 11px;
  font-family: var(--font);
  text-anchor: middle;
  pointer-events: none;
}
.svg-label-bold {
  fill: var(--text);
  font-size: 11.5px;
  font-weight: 600;
  font-family: var(--font);
  text-anchor: middle;
  pointer-events: none;
}
.svg-label-sm {
  fill: var(--text-dim);
  font-size: 9.5px;
  font-family: var(--font);
  text-anchor: middle;
  pointer-events: none;
}
.svg-label-color {
  font-size: 10px;
  font-family: var(--font);
  text-anchor: middle;
  pointer-events: none;
}

/* Tooltip */
#tooltip {
  position: fixed;
  display: none;
  background: #1a2d48;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  color: var(--text-bright);
  font-family: var(--font);
  font-size: 0.78rem;
  line-height: 1.5;
  max-width: 280px;
  pointer-events: none;
  z-index: 100;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  white-space: pre-line;
}

/* Responsive */
@media (max-width: 640px) {
  body { padding: 8px; }
  h1 { font-size: 1.15rem; }
  .tabs { flex-direction: column; align-items: center; }
  .info-bar { flex-direction: column; }
  .tab-btn { width: 100%; max-width: 280px; }
}
</style>
</head>
<body>

<div id="app">
  <header>
    <h1>Circuit d'éclairage</h1>
    <p class="subtitle">Commande depuis plusieurs endroits — sans électronique</p>
    <nav class="tabs">
      <button class="tab-btn active" data-tab="2pt" onclick="switchTab('2pt')">
        Va-et-vient simple
        <small>2 points de commande</small>
      </button>
      <button class="tab-btn" data-tab="3pt" onclick="switchTab('3pt')">
        Va-et-vient + permutateur
        <small>3 points de commande</small>
      </button>
    </nav>
  </header>

  <main>
    <div class="svg-wrap">
      <svg id="circuit" viewBox="0 0 960 540" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <!-- Blueprint grid -->
          <pattern id="grid-pat" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#11253f" stroke-width="0.6"/>
          </pattern>

          <!-- Wire glow filter -->
          <filter id="glow-wire" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="3.5" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>

          <!-- Lamp glow (large warm halo) -->
          <filter id="glow-lamp" x="-100%" y="-100%" width="300%" height="300%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="14" result="b"/>
            <feColorMatrix in="b" type="matrix"
              values="1.2 0 0 0 0.08
                      0 0.95 0 0 0.04
                      0 0 0.5 0 0
                      0 0 0 0.75 0" result="warm"/>
            <feMerge><feMergeNode in="warm"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>

          <!-- Filament glow -->
          <filter id="glow-lamp-fil" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>

          <!-- Lamp glow gradient -->
          <radialGradient id="lamp-glow-grad" cx="50%" cy="45%" r="50%">
            <stop offset="0%" stop-color="#fff8e0" stop-opacity="0.7"/>
            <stop offset="40%" stop-color="#ffd54f" stop-opacity="0.3"/>
            <stop offset="100%" stop-color="#ff8f00" stop-opacity="0"/>
          </radialGradient>
        </defs>

        <!-- Background -->
        <rect width="960" height="540" fill="var(--bg-panel)"/>
        <rect width="960" height="540" fill="url(#grid-pat)" opacity="0.6"/>

        <!-- ════════════════════════════════════════════════════ -->
        <!-- TAB 1: Va-et-vient simple — 2 points de commande   -->
        <!-- ════════════════════════════════════════════════════ -->
        <g id="tab-2pt">

          <!-- ── Wires ── -->
          <!-- Phase: source to SW1 common -->
          <path id="t1-phase" class="wire wire-phase" d="M 80,170 L 158,170"/>
          <!-- Shuttle A: SW1 trav-A to SW2 trav-A -->
          <path id="t1-shuttle-a" class="wire wire-shuttle" d="M 262,145 L 668,145"/>
          <!-- Shuttle B: SW1 trav-B to SW2 trav-B -->
          <path id="t1-shuttle-b" class="wire wire-shuttle" d="M 262,195 L 668,195"/>
          <!-- Return: SW2 common to lamp -->
          <path id="t1-return" class="wire wire-retour" d="M 772,170 L 850,170 L 850,365 L 512,365"/>
          <!-- Neutral: lamp to neutral source -->
          <path id="t1-neutral" class="wire wire-neutral" d="M 490,387 L 490,455 L 80,455"/>

          <!-- ── Phase source dot ── -->
          <circle cx="80" cy="170" r="7" fill="var(--phase)" opacity="0.8"/>
          <text class="svg-label-color" x="80" y="152" fill="var(--phase)">Phase (L)</text>

          <!-- ── Neutral source dot ── -->
          <circle cx="80" cy="455" r="7" fill="var(--neutral)" opacity="0.8"/>
          <text class="svg-label-color" x="80" y="475" fill="var(--neutral)">Neutre (N)</text>

          <!-- ── SW1: va-et-vient 1 ── -->
          <g id="t1-sw1" transform="translate(210,170)"
             data-tooltip="Interrupteur va-et-vient n°1&#10;Commute le commun (phase) entre deux navettes.&#10;Cliquez pour basculer.">
            <rect class="switch-body" x="-52" y="-48" width="104" height="96"/>
            <!-- Common terminal (left) -->
            <circle id="t1-sw1-tc" class="terminal" cx="-52" cy="0" r="6"/>
            <!-- Traveler A terminal (right-top) -->
            <circle id="t1-sw1-ta" class="terminal" cx="52" cy="-25" r="6"/>
            <!-- Traveler B terminal (right-bottom) -->
            <circle id="t1-sw1-tb" class="terminal" cx="52" cy="25" r="6"/>
            <!-- Contact arm -->
            <line id="t1-sw1-arm" class="arm" x1="-44" y1="0" x2="44" y2="-25"/>
            <!-- Labels inside -->
            <text class="svg-label-sm" x="-38" y="-32">C</text>
            <text class="svg-label-sm" x="38" y="-36">A</text>
            <text class="svg-label-sm" x="38" y="40">B</text>
            <!-- Click zone -->
            <rect class="click-zone" x="-56" y="-52" width="112" height="104"
                  onclick="toggleSwitch('2pt','sw1')"/>
          </g>
          <text class="svg-label-bold" x="210" y="240">Interrupteur 1</text>
          <text id="t1-sw1-lbl" class="svg-label-sm" x="210" y="254">Position A ↑</text>

          <!-- ── SW2: va-et-vient 2 ── -->
          <g id="t1-sw2" transform="translate(720,170)"
             data-tooltip="Interrupteur va-et-vient n°2&#10;Commute le retour lampe entre deux navettes.&#10;Cliquez pour basculer.">
            <rect class="switch-body" x="-52" y="-48" width="104" height="96"/>
            <!-- Traveler A (left-top) -->
            <circle id="t1-sw2-ta" class="terminal" cx="-52" cy="-25" r="6"/>
            <!-- Traveler B (left-bottom) -->
            <circle id="t1-sw2-tb" class="terminal" cx="-52" cy="25" r="6"/>
            <!-- Common (right) -->
            <circle id="t1-sw2-tc" class="terminal" cx="52" cy="0" r="6"/>
            <!-- Contact arm -->
            <line id="t1-sw2-arm" class="arm" x1="44" y1="0" x2="-44" y2="-25"/>
            <!-- Labels inside -->
            <text class="svg-label-sm" x="-38" y="-36">A</text>
            <text class="svg-label-sm" x="-38" y="40">B</text>
            <text class="svg-label-sm" x="38" y="-32">C</text>
            <!-- Click zone -->
            <rect class="click-zone" x="-56" y="-52" width="112" height="104"
                  onclick="toggleSwitch('2pt','sw2')"/>
          </g>
          <text class="svg-label-bold" x="720" y="240">Interrupteur 2</text>
          <text id="t1-sw2-lbl" class="svg-label-sm" x="720" y="254">Position A ↑</text>

          <!-- ── Shuttle labels ── -->
          <text class="svg-label" x="465" y="138"
                data-tooltip="Navette A&#10;L'un des deux fils reliant les interrupteurs.&#10;Le courant y passe quand les deux interrupteurs sont en position A.">Navette A</text>
          <text class="svg-label" x="465" y="212"
                data-tooltip="Navette B&#10;L'un des deux fils reliant les interrupteurs.&#10;Le courant y passe quand les deux interrupteurs sont en position B.">Navette B</text>

          <!-- ── Return label ── -->
          <text class="svg-label-color" x="870" y="272" fill="var(--retour)" transform="rotate(90,870,272)"
                data-tooltip="Retour lampe&#10;Ce fil transporte le courant depuis l'interrupteur 2 vers la lampe.">Retour</text>

          <!-- ── Lamp ── -->
          <g id="t1-lamp" class="lamp-group on" transform="translate(490,365)"
             data-tooltip="Lampe&#10;S'allume quand le circuit est fermé :&#10;un chemin continu relie la phase au neutre.">
            <circle class="lamp-glow" r="45" filter="url(#glow-lamp)"/>
            <circle class="lamp-glass" r="22"/>
            <path class="lamp-filament" d="M -8,-4 Q -4,-14 0,-2 Q 4,-14 8,-4"/>
            <rect class="lamp-base-r" x="-10" y="17" width="20" height="6" rx="2"/>
          </g>
          <text class="svg-label-bold" x="490" y="410">Lampe</text>

        </g><!-- /tab-2pt -->

        <!-- ════════════════════════════════════════════════════ -->
        <!-- TAB 2: Va-et-vient + permutateur — 3 points        -->
        <!-- ════════════════════════════════════════════════════ -->
        <g id="tab-3pt" display="none">

          <!-- ── Wires ── -->
          <path id="t2-phase" class="wire wire-phase" d="M 50,170 L 98,170"/>
          <path id="t2-shuttle-al" class="wire wire-shuttle" d="M 202,145 L 363,145"/>
          <path id="t2-shuttle-bl" class="wire wire-shuttle" d="M 202,195 L 363,195"/>
          <path id="t2-shuttle-ar" class="wire wire-shuttle" d="M 497,145 L 668,145"/>
          <path id="t2-shuttle-br" class="wire wire-shuttle" d="M 497,195 L 668,195"/>
          <path id="t2-return" class="wire wire-retour" d="M 772,170 L 850,170 L 850,365 L 512,365"/>
          <path id="t2-neutral" class="wire wire-neutral" d="M 490,387 L 490,455 L 50,455"/>

          <!-- ── Phase source ── -->
          <circle cx="50" cy="170" r="7" fill="var(--phase)" opacity="0.8"/>
          <text class="svg-label-color" x="50" y="152" fill="var(--phase)">Phase (L)</text>

          <!-- ── Neutral source ── -->
          <circle cx="50" cy="455" r="7" fill="var(--neutral)" opacity="0.8"/>
          <text class="svg-label-color" x="50" y="475" fill="var(--neutral)">Neutre (N)</text>

          <!-- ── SW1 ── -->
          <g id="t2-sw1" transform="translate(150,170)"
             data-tooltip="Interrupteur va-et-vient n°1&#10;Premier point de commande.&#10;Commute la phase entre les deux navettes.&#10;Cliquez pour basculer.">
            <rect class="switch-body" x="-52" y="-48" width="104" height="96"/>
            <circle id="t2-sw1-tc" class="terminal" cx="-52" cy="0" r="6"/>
            <circle id="t2-sw1-ta" class="terminal" cx="52" cy="-25" r="6"/>
            <circle id="t2-sw1-tb" class="terminal" cx="52" cy="25" r="6"/>
            <line id="t2-sw1-arm" class="arm" x1="-44" y1="0" x2="44" y2="-25"/>
            <text class="svg-label-sm" x="-38" y="-32">C</text>
            <text class="svg-label-sm" x="38" y="-36">A</text>
            <text class="svg-label-sm" x="38" y="40">B</text>
            <rect class="click-zone" x="-56" y="-52" width="112" height="104"
                  onclick="toggleSwitch('3pt','sw1')"/>
          </g>
          <text class="svg-label-bold" x="150" y="240">Interrupteur 1</text>
          <text id="t2-sw1-lbl" class="svg-label-sm" x="150" y="254">Position A ↑</text>

          <!-- ── Crossover (Permutateur) ── -->
          <g id="t2-crossover" transform="translate(430,170)"
             data-tooltip="Permutateur (interrupteur de croisement)&#10;4 bornes : croise ou laisse passer droit les navettes.&#10;En liaison droite : A→A et B→B&#10;En liaison croisée : A→B et B→A&#10;Cliquez pour basculer.">
            <rect class="cross-body" x="-67" y="-52" width="134" height="104"/>
            <!-- 4 terminals -->
            <circle id="t2-cr-it" class="terminal" cx="-67" cy="-25" r="6"/>
            <circle id="t2-cr-ib" class="terminal" cx="-67" cy="25" r="6"/>
            <circle id="t2-cr-ot" class="terminal" cx="67" cy="-25" r="6"/>
            <circle id="t2-cr-ob" class="terminal" cx="67" cy="25" r="6"/>
            <!-- Internal connections -->
            <path id="t2-cross-1" class="wire wire-cross"
                  d="M -67,-25 C -20,-14 20,-14 67,-25"/>
            <path id="t2-cross-2" class="wire wire-cross"
                  d="M -67,25 C -20,14 20,14 67,25"/>
            <!-- Terminal labels -->
            <text class="svg-label-sm" x="-55" y="-34">1</text>
            <text class="svg-label-sm" x="-55" y="38">2</text>
            <text class="svg-label-sm" x="55" y="-34">3</text>
            <text class="svg-label-sm" x="55" y="38">4</text>
            <!-- Click zone -->
            <rect class="click-zone" x="-70" y="-55" width="140" height="110"
                  onclick="toggleSwitch('3pt','cross')"/>
          </g>
          <text class="svg-label-bold" x="430" y="245">Permutateur</text>
          <text id="t2-cross-lbl" class="svg-label-sm" x="430" y="259">Liaison droite ═══</text>

          <!-- ── SW2 ── -->
          <g id="t2-sw2" transform="translate(720,170)"
             data-tooltip="Interrupteur va-et-vient n°2&#10;Dernier point de commande.&#10;Commute le retour lampe entre les deux navettes.&#10;Cliquez pour basculer.">
            <rect class="switch-body" x="-52" y="-48" width="104" height="96"/>
            <circle id="t2-sw2-ta" class="terminal" cx="-52" cy="-25" r="6"/>
            <circle id="t2-sw2-tb" class="terminal" cx="-52" cy="25" r="6"/>
            <circle id="t2-sw2-tc" class="terminal" cx="52" cy="0" r="6"/>
            <line id="t2-sw2-arm" class="arm" x1="44" y1="0" x2="-44" y2="-25"/>
            <text class="svg-label-sm" x="-38" y="-36">A</text>
            <text class="svg-label-sm" x="-38" y="40">B</text>
            <text class="svg-label-sm" x="38" y="-32">C</text>
            <rect class="click-zone" x="-56" y="-52" width="112" height="104"
                  onclick="toggleSwitch('3pt','sw2')"/>
          </g>
          <text class="svg-label-bold" x="720" y="240">Interrupteur 2</text>
          <text id="t2-sw2-lbl" class="svg-label-sm" x="720" y="254">Position A ↑</text>

          <!-- ── Shuttle labels ── -->
          <text class="svg-label" x="282" y="138">Nav. A</text>
          <text class="svg-label" x="282" y="212">Nav. B</text>
          <text class="svg-label" x="583" y="138">Nav. A</text>
          <text class="svg-label" x="583" y="212">Nav. B</text>

          <!-- ── Return label ── -->
          <text class="svg-label-color" x="870" y="272" fill="var(--retour)" transform="rotate(90,870,272)">Retour</text>

          <!-- ── Lamp ── -->
          <g id="t2-lamp" class="lamp-group on" transform="translate(490,365)"
             data-tooltip="Lampe&#10;S'allume quand un chemin continu relie&#10;la phase au neutre à travers les interrupteurs.">
            <circle class="lamp-glow" r="45" filter="url(#glow-lamp)"/>
            <circle class="lamp-glass" r="22"/>
            <path class="lamp-filament" d="M -8,-4 Q -4,-14 0,-2 Q 4,-14 8,-4"/>
            <rect class="lamp-base-r" x="-10" y="17" width="20" height="6" rx="2"/>
          </g>
          <text class="svg-label-bold" x="490" y="410">Lampe</text>

        </g><!-- /tab-3pt -->

      </svg>
    </div>

    <div class="info-bar">
      <div id="status-panel">
        <div class="st-row">
          <span class="st-label">Interrupteur 1 :</span>
          <span id="st-sw1" class="st-val">Position A ↑</span>
        </div>
        <div id="st-cross-row" class="st-row" style="display:none">
          <span class="st-label">Permutateur :</span>
          <span id="st-cross" class="st-val">Liaison droite</span>
        </div>
        <div class="st-row">
          <span class="st-label">Interrupteur 2 :</span>
          <span id="st-sw2" class="st-val">Position A ↑</span>
        </div>
        <div class="st-divider"></div>
        <div class="st-row">
          <span class="st-label">Circuit :</span>
          <span id="st-circuit" class="st-val on">Fermé</span>
        </div>
        <div class="st-row">
          <span class="st-label">Lampe :</span>
          <span id="st-lamp" class="st-val on">Allumée</span>
        </div>
      </div>

      <div id="controls">
        <button class="ctrl-btn" onclick="resetCircuit()">Réinitialiser</button>
        <button id="btn-auto" class="ctrl-btn" onclick="toggleAutoplay()">Lecture automatique</button>
      </div>
    </div>

    <div class="legend">
      <span class="legend-item"><span class="swatch phase"></span> Phase</span>
      <span class="legend-item"><span class="swatch neutral"></span> Neutre</span>
      <span class="legend-item"><span class="swatch retour"></span> Retour lampe</span>
      <span class="legend-item"><span class="swatch shuttle"></span> Navettes</span>
      <span class="legend-item"><span class="swatch active"></span> Chemin actif</span>
    </div>
  </main>
</div>

<div id="tooltip"></div>

<script>
/* ═══════════════════════════════════════════════════════════
   Circuit Va-et-Vient — Interactive Simulator
   Pure vanilla JS, no dependencies
   ═══════════════════════════════════════════════════════════ */

// ─── State ───
const state = {
  tab: '2pt',
  autoplay: false,
  autoTimer: null,
  autoIndex: 0,
  switches: {
    '2pt': { sw1: 0, sw2: 0 },       // 0 = position A (top), 1 = position B (bottom)
    '3pt': { sw1: 0, cross: 0, sw2: 0 } // cross: 0 = straight, 1 = crossed
  }
};

// ─── Circuit Logic ───
// Returns { closed: bool, segments: string[] } for the active tab
function getActivePath(tabId) {
  const s = state.switches[tabId];
  if (tabId === '2pt') {
    // closed when both switches select the same shuttle
    const closed = s.sw1 === s.sw2;
    if (!closed) return { closed: false, segments: [] };
    const shuttle = s.sw1 === 0 ? 't1-shuttle-a' : 't1-shuttle-b';
    return { closed: true, segments: ['t1-phase', shuttle, 't1-return', 't1-neutral'] };
  }
  // 3-point: phase → SW1 → left shuttle → crossover → right shuttle → SW2 → lamp
  const enterTop = s.sw1 === 0;
  const exitTop = s.cross === 0 ? enterTop : !enterTop;
  const sw2Top = s.sw2 === 0;
  const closed = exitTop === sw2Top;
  if (!closed) return { closed: false, segments: [] };

  const leftShuttle  = enterTop ? 't2-shuttle-al' : 't2-shuttle-bl';
  const crossPath    = enterTop ? 't2-cross-1' : 't2-cross-2';
  const rightShuttle = exitTop  ? 't2-shuttle-ar' : 't2-shuttle-br';
  return {
    closed: true,
    segments: ['t2-phase', leftShuttle, crossPath, rightShuttle, 't2-return', 't2-neutral']
  };
}

// ─── Update Circuit Visuals ───
function updateCircuit(tabId) {
  const result = getActivePath(tabId);
  const tabEl = document.getElementById('tab-' + tabId);

  // Update wires
  tabEl.querySelectorAll('.wire').forEach(w => {
    const isActive = result.closed && result.segments.includes(w.id);
    w.classList.toggle('active', isActive);
    w.classList.toggle('flowing', isActive);
  });

  // Update lamp
  const prefix = tabId === '2pt' ? 't1' : 't2';
  const lamp = document.getElementById(prefix + '-lamp');
  lamp.classList.toggle('on', result.closed);
  lamp.classList.toggle('off', !result.closed);

  // Update terminals & arms highlight
  updateTerminals(tabId, result);

  // Update status panel
  updateStatus(tabId, result.closed);

  // Update SVG labels
  updateSvgLabels(tabId);
}

// Highlight active terminals and arms
function updateTerminals(tabId, result) {
  const prefix = tabId === '2pt' ? 't1' : 't2';
  const s = state.switches[tabId];

  // All terminal and arm elements for this tab
  ['sw1', 'sw2'].forEach(sw => {
    const armEl = document.getElementById(`${prefix}-${sw}-arm`);
    const tcEl = document.getElementById(`${prefix}-${sw}-tc`);
    const taEl = document.getElementById(`${prefix}-${sw}-ta`);
    const tbEl = document.getElementById(`${prefix}-${sw}-tb`);
    const isA = s[sw] === 0;
    armEl.classList.toggle('active-arm', result.closed);
    tcEl.classList.toggle('active-term', result.closed);
    taEl.classList.toggle('active-term', result.closed && isA);
    tbEl.classList.toggle('active-term', result.closed && !isA);
  });

  if (tabId === '3pt') {
    // Crossover terminals
    const enterTop = s.sw1 === 0;
    const exitTop = s.cross === 0 ? enterTop : !enterTop;
    ['it', 'ib', 'ot', 'ob'].forEach(t => {
      const el = document.getElementById('t2-cr-' + t);
      let active = false;
      if (result.closed) {
        if (t === 'it') active = enterTop;
        if (t === 'ib') active = !enterTop;
        if (t === 'ot') active = exitTop;
        if (t === 'ob') active = !exitTop;
      }
      el.classList.toggle('active-term', active);
    });
  }
}

// ─── Switch Toggling + Animation ───
function toggleSwitch(tabId, key) {
  const s = state.switches[tabId];
  if (key === 'cross') {
    s.cross = 1 - s.cross;
    animateCrossover(s.cross);
  } else {
    s[key] = 1 - s[key];
    animateArm(tabId, key, s[key]);
  }
  updateCircuit(tabId);
}

// Animate switch arm (interpolate y2 between -25 and 25)
function animateArm(tabId, key, newPos) {
  const prefix = tabId === '2pt' ? 't1' : 't2';
  const arm = document.getElementById(`${prefix}-${key}-arm`);
  const startY = parseFloat(arm.getAttribute('y2'));
  const endY = newPos === 0 ? -25 : 25;
  if (startY === endY) return;

  const t0 = performance.now();
  const dur = 220;
  (function tick(now) {
    const t = Math.min((now - t0) / dur, 1);
    const e = easeInOutQuad(t);
    arm.setAttribute('y2', lerp(startY, endY, e).toFixed(1));
    if (t < 1) requestAnimationFrame(tick);
  })(t0);
}

// Animate crossover internal paths
function animateCrossover(newState) {
  const p1 = document.getElementById('t2-cross-1');
  const p2 = document.getElementById('t2-cross-2');

  // Parse current cp2Y and endY from each path
  const cur1 = parseCrossD(p1.getAttribute('d'));
  const cur2 = parseCrossD(p2.getAttribute('d'));

  // Targets: straight → slight bow inward; crossed → full swap
  // Path1 starts at y=-25: straight cp=-14/end=-25, crossed cp=25/end=25
  // Path2 starts at y=25:  straight cp=14/end=25,   crossed cp=-25/end=-25
  const tgt1 = newState === 0 ? { cp: -14, end: -25 } : { cp: 25, end: 25 };
  const tgt2 = newState === 0 ? { cp: 14, end: 25 }   : { cp: -25, end: -25 };

  const t0 = performance.now();
  const dur = 280;
  (function tick(now) {
    const t = Math.min((now - t0) / dur, 1);
    const e = easeInOutQuad(t);

    const cp1 = lerp(cur1.cp, tgt1.cp, e).toFixed(1);
    const ey1 = lerp(cur1.end, tgt1.end, e).toFixed(1);
    p1.setAttribute('d', `M -67,-25 C -20,-25 20,${cp1} 67,${ey1}`);

    const cp2 = lerp(cur2.cp, tgt2.cp, e).toFixed(1);
    const ey2 = lerp(cur2.end, tgt2.end, e).toFixed(1);
    p2.setAttribute('d', `M -67,25 C -20,25 20,${cp2} 67,${ey2}`);

    if (t < 1) requestAnimationFrame(tick);
  })(t0);
}

// Parse "M -67,Y C -17,Y 17,CP 67,END" → { cp, end }
function parseCrossD(d) {
  const nums = d.match(/-?\d+\.?\d*/g);
  // nums: [-67, startY, -17, ctrl1Y, 17, cp2Y, 67, endY]
  return { cp: parseFloat(nums[5]), end: parseFloat(nums[7]) };
}

// ─── Tab Switching ───
function switchTab(tabId) {
  if (state.tab === tabId) return;
  stopAutoplay();
  state.tab = tabId;

  // Toggle SVG visibility
  document.getElementById('tab-2pt').setAttribute('display', tabId === '2pt' ? '' : 'none');
  document.getElementById('tab-3pt').setAttribute('display', tabId === '3pt' ? '' : 'none');

  // Toggle tab buttons
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === tabId);
  });

  // Toggle crossover status row
  document.getElementById('st-cross-row').style.display = tabId === '3pt' ? '' : 'none';

  updateCircuit(tabId);
}

// ─── Status Panel Update ───
function updateStatus(tabId, closed) {
  const s = state.switches[tabId];
  const posLabel = v => v === 0 ? 'Position A ↑' : 'Position B ↓';
  const crossLabel = v => v === 0 ? 'Liaison droite' : 'Liaison croisée';

  const stSw1 = document.getElementById('st-sw1');
  stSw1.textContent = posLabel(s.sw1);

  const stSw2 = document.getElementById('st-sw2');
  stSw2.textContent = posLabel(s.sw2);

  if (tabId === '3pt') {
    const stCross = document.getElementById('st-cross');
    stCross.textContent = crossLabel(s.cross);
  }

  const stCircuit = document.getElementById('st-circuit');
  stCircuit.textContent = closed ? 'Fermé' : 'Ouvert';
  stCircuit.className = 'st-val ' + (closed ? 'on' : 'off');

  const stLamp = document.getElementById('st-lamp');
  stLamp.textContent = closed ? 'Allumée' : 'Éteinte';
  stLamp.className = 'st-val ' + (closed ? 'on' : 'off');
}

// ─── SVG Labels Update ───
function updateSvgLabels(tabId) {
  const s = state.switches[tabId];
  const prefix = tabId === '2pt' ? 't1' : 't2';
  const posLabel = v => v === 0 ? 'Position A ↑' : 'Position B ↓';

  const sw1Lbl = document.getElementById(`${prefix}-sw1-lbl`);
  if (sw1Lbl) sw1Lbl.textContent = posLabel(s.sw1);
  const sw2Lbl = document.getElementById(`${prefix}-sw2-lbl`);
  if (sw2Lbl) sw2Lbl.textContent = posLabel(s.sw2);

  if (tabId === '3pt') {
    const crossLbl = document.getElementById('t2-cross-lbl');
    if (crossLbl) crossLbl.textContent = s.cross === 0 ? 'Liaison droite ═══' : 'Liaison croisée ╳';
  }
}

// ─── Autoplay ───
const AUTOPLAY_SEQ = {
  '2pt': [
    { sw1: 0, sw2: 0 },  // ON
    { sw1: 1, sw2: 0 },  // OFF — toggle sw1
    { sw1: 1, sw2: 1 },  // ON  — toggle sw2
    { sw1: 0, sw2: 1 },  // OFF — toggle sw1
  ],
  '3pt': [
    { sw1: 0, cross: 0, sw2: 0 },  // ON
    { sw1: 1, cross: 0, sw2: 0 },  // OFF — toggle sw1
    { sw1: 1, cross: 1, sw2: 0 },  // ON  — toggle cross
    { sw1: 1, cross: 1, sw2: 1 },  // OFF — toggle sw2
    { sw1: 0, cross: 1, sw2: 1 },  // ON  — toggle sw1
    { sw1: 0, cross: 0, sw2: 1 },  // OFF — toggle cross
  ]
};

function toggleAutoplay() {
  state.autoplay ? stopAutoplay() : startAutoplay();
}

function startAutoplay() {
  state.autoplay = true;
  state.autoIndex = -1;
  document.getElementById('btn-auto').classList.add('active-auto');
  document.getElementById('btn-auto').textContent = 'Arrêter';
  autoplayStep(); // first step immediately
  state.autoTimer = setInterval(autoplayStep, 1600);
}

function stopAutoplay() {
  state.autoplay = false;
  clearInterval(state.autoTimer);
  state.autoTimer = null;
  document.getElementById('btn-auto').classList.remove('active-auto');
  document.getElementById('btn-auto').textContent = 'Lecture automatique';
}

function autoplayStep() {
  const tabId = state.tab;
  const seq = AUTOPLAY_SEQ[tabId];
  state.autoIndex = (state.autoIndex + 1) % seq.length;
  const target = seq[state.autoIndex];
  const current = state.switches[tabId];

  // Find and toggle the switch that differs
  for (const key of Object.keys(target)) {
    if (current[key] !== target[key]) {
      toggleSwitch(tabId, key);
      break;
    }
  }
}

// ─── Reset ───
function resetCircuit() {
  stopAutoplay();
  const tabId = state.tab;
  const s = state.switches[tabId];
  const keys = Object.keys(s);

  // Animate each switch back to 0
  keys.forEach(key => {
    if (s[key] !== 0) {
      toggleSwitch(tabId, key);
    }
  });
}

// ─── Tooltip System ───
const tooltipEl = document.getElementById('tooltip');

document.getElementById('circuit').addEventListener('mousemove', e => {
  const target = e.target.closest('[data-tooltip]');
  if (!target) { tooltipEl.style.display = 'none'; return; }
  tooltipEl.textContent = target.getAttribute('data-tooltip');
  tooltipEl.style.display = 'block';

  // Position near cursor
  const pad = 14;
  let x = e.clientX + pad;
  let y = e.clientY + pad;
  // Keep on screen
  const r = tooltipEl.getBoundingClientRect();
  if (x + r.width > window.innerWidth - 8) x = e.clientX - r.width - pad;
  if (y + r.height > window.innerHeight - 8) y = e.clientY - r.height - pad;
  tooltipEl.style.left = x + 'px';
  tooltipEl.style.top = y + 'px';
});

document.getElementById('circuit').addEventListener('mouseleave', () => {
  tooltipEl.style.display = 'none';
});

// ─── Utilities ───
function lerp(a, b, t) { return a + (b - a) * t; }
function easeInOutQuad(t) { return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t; }

// ─── Init ───
updateCircuit('2pt');
</script>

</body>
</html>
